<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vet Vida — Radar Comercial</title>
<link rel="manifest" href="../manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1f2937;}
:root{--red:#CC0000;--red-soft:#fdf2f2;--border:#e2e8f0;--muted:#6b7280;}

/* Header */
.header{background:#CC0000;color:white;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
.header h1{font-size:17px;font-weight:700;flex:1;}
.btn-back{background:rgba(255,255,255,0.2);border:none;color:white;border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

/* Abas */
.abas{display:flex;background:white;border-bottom:2px solid var(--border);position:sticky;top:56px;z-index:9;}
.aba{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.15s;}
.aba.ativa{color:var(--red);border-bottom-color:var(--red);}

/* Search */
.search-box{padding:14px 16px 10px;background:white;}
.search-box input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:10px;font-size:15px;outline:none;transition:border-color 0.2s;}
.search-box input:focus{border-color:var(--red);}

/* Macro chips */
.macro-chips{display:flex;gap:6px;padding:8px 16px 10px;overflow-x:auto;scrollbar-width:none;background:white;border-bottom:1px solid #f1f5f9;}
.macro-chips::-webkit-scrollbar{display:none;}
.mchip{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.mchip.ativo{background:var(--red);border-color:var(--red);color:white;}

/* Filtros sub */
.filtros{display:flex;gap:8px;padding:8px 16px 10px;overflow-x:auto;scrollbar-width:none;background:white;border-bottom:1px solid #f1f5f9;}
.filtros::-webkit-scrollbar{display:none;}
.fbtn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.15s;}
.fbtn.ativo{background:var(--red);border-color:var(--red);color:white;}

.contador{font-size:12px;color:#9ca3af;padding:8px 16px 4px;}
.lista{padding:10px 16px 80px;}

/* Cards substituição */
.radar-card{background:white;border-radius:12px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;cursor:pointer;}
.card-topo{padding:13px 14px;display:flex;align-items:center;gap:10px;}
.card-nomes{flex:1;min-width:0;}
.card-concorrente{font-size:14px;font-weight:700;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-lab{font-size:11px;color:#9ca3af;margin-top:2px;}
.badge-sub{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.sub-sim{background:#dcfce7;color:#16a34a;}
.sub-ressalva{background:#fef9c3;color:#b45309;}
.sub-nao{background:#fee2e2;color:#dc2626;}
.sub-vazio{background:#f1f5f9;color:#64748b;}

.card-detalhe{padding:0 14px 14px;border-top:1px solid #f1f5f9;display:none;}
.card-detalhe.aberto{display:block;}
.row{margin-top:10px;}
.row-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#9ca3af;letter-spacing:0.5px;margin-bottom:3px;}
.row-val{font-size:13px;color:#374151;line-height:1.4;}

.candidatos{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.cand{border-radius:10px;padding:10px 12px;}
.cand-p1{background:#fdf2f2;border-left:3px solid var(--red);}
.cand-p2{background:#f8fafc;border-left:3px solid #94a3b8;}
.cand-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.cand-nome{font-size:13px;font-weight:700;color:#1f2937;}
.cand-lab{font-size:11px;color:#6b7280;margin-top:1px;}
.cand-nivel{font-size:11px;color:var(--red);font-weight:600;margin-top:4px;}
.cand-sku{font-size:11px;color:#6b7280;margin-top:3px;line-height:1.4;}

.box-com{background:#f0f9ff;border-left:3px solid #0284c7;border-radius:0 8px 8px 0;padding:8px 12px;margin-top:10px;}
.box-com-val{font-size:12px;color:#0c4a6e;line-height:1.4;}
.box-alert{background:#fffbeb;border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:8px 12px;margin-top:8px;}
.box-alert-val{font-size:12px;color:#92400e;line-height:1.4;}
.box-cross{margin-top:10px;background:#f0fdf4;border-radius:10px;padding:10px 12px;}
.box-cross-title{font-size:10px;font-weight:700;text-transform:uppercase;color:#16a34a;margin-bottom:6px;letter-spacing:0.5px;}
.box-cross-item{font-size:12px;color:#166534;line-height:1.4;margin-bottom:4px;}
.lacuna{display:inline-block;font-size:10px;font-weight:600;background:#fee2e2;color:#b91c1c;padding:2px 8px;border-radius:20px;margin-top:6px;}

/* Cross-selling */
#cross-section{display:none;padding-bottom:80px;}
.cross-card{background:white;border-radius:12px;border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.cross-card-inner{padding:13px 14px;}
.cross-gatilho{font-size:14px;font-weight:700;color:#1f2937;}
.cross-esp{font-size:11px;color:#9ca3af;margin-top:2px;}
.prio-alta{display:inline-block;font-size:10px;font-weight:700;background:#dcfce7;color:#16a34a;padding:2px 8px;border-radius:20px;margin-top:6px;}
.prio-media{display:inline-block;font-size:10px;font-weight:700;background:#fef9c3;color:#b45309;padding:2px 8px;border-radius:20px;margin-top:6px;}
.cross-prods{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.cross-prod{background:#fdf2f2;color:var(--red);font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;border:1px solid #fecaca;}
.cross-just{font-size:12px;color:#374151;line-height:1.5;margin-top:8px;}
.cross-cuidado{font-size:11px;color:#92400e;background:#fffbeb;border-radius:8px;padding:6px 10px;margin-top:6px;line-height:1.4;}

.vazio{text-align:center;padding:48px 20px;color:#9ca3af;font-size:14px;line-height:1.6;}
</style>
</head>
<body>

<div class="header">
  <button class="btn-back" onclick="history.back()">←</button>
  <h1>📡 Radar Comercial</h1>
</div>

<div class="abas">
  <div class="aba ativa" onclick="setAba('busca',this)">🔍 Substituição</div>
  <div class="aba" onclick="setAba('cross',this)">🔗 Cross-Selling</div>
</div>

<!-- ABA SUBSTITUIÇÃO -->
<div id="busca-section">
  <div class="search-box">
    <input type="text" id="radar-input" placeholder="Produto concorrente, ativo ou laboratório..." oninput="renderRadar()" autocomplete="off">
  </div>
  <div class="macro-chips" id="macro-chips"></div>
  <div class="filtros">
    <button class="fbtn ativo" onclick="setFiltroSub('',this)">Todos</button>
    <button class="fbtn" onclick="setFiltroSub('sim',this)">✅ Substituível</button>
    <button class="fbtn" onclick="setFiltroSub('ressalva',this)">⚠️ Com ressalva</button>
    <button class="fbtn" onclick="setFiltroSub('nao',this)">❌ Sem equivalente</button>
  </div>
  <div class="contador" id="radar-contador"></div>
  <div class="lista" id="radar-lista"></div>
</div>

<!-- ABA CROSS-SELLING -->
<div id="cross-section">
  <div class="search-box">
    <input type="text" id="cross-input" placeholder="Buscar por categoria ou produto..." oninput="renderCross()" autocomplete="off">
  </div>
  <div class="contador" id="cross-contador"></div>
  <div class="lista" id="cross-lista"></div>
</div>

const RADAR_MACROS = ["Antipulgas / Carrapatos", "Vermífugos", "Antibióticos", "Anti-inflamatórios", "Otológicos", "Dermatológicos", "Suplementos", "Cardiológicos", "Vacinas", "Diagnóstico", "Neurológicos", "Outros"];
let filtroSub = '', filtroMacro = '';

function setAba(aba, el) {
  document.querySelectorAll('.aba').forEach(e => e.classList.remove('ativa'));
  el.classList.add('ativa');
  document.getElementById('busca-section').style.display = aba==='busca' ? 'block' : 'none';
  document.getElementById('cross-section').style.display = aba==='cross' ? 'block' : 'none';
  if(aba==='cross') { setTimeout(()=>{ document.getElementById('cross-input').focus(); renderCross(); },50); }
  else { setTimeout(()=>{ document.getElementById('radar-input').focus(); },50); }
}

function renderMacroChips() {
  const chips = document.getElementById('macro-chips');
  chips.innerHTML = ['Todos', ...RADAR_MACROS].map(m => `
    <button class="mchip${(m==='Todos'&&!filtroMacro)||(m===filtroMacro)?' ativo':''}"
      onclick="setMacro('${m}',this)">${m==='Todos'?'Todas':m}</button>
  `).join('');
}

function setMacro(m, btn) {
  filtroMacro = m==='Todos' ? '' : m;
  document.querySelectorAll('.mchip').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderRadar();
}

function setFiltroSub(val, btn) {
  filtroSub = val;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('ativo'));
  btn.classList.add('ativo');
  renderRadar();
}

function badgeSub(sub) {
  const s = (sub||'').toLowerCase();
  if(s.includes('ressalva')) return {cls:'sub-ressalva', txt:'⚠️ Com ressalva'};
  if(s.startsWith('sim')) return {cls:'sub-sim', txt:'✅ Substituível'};
  if(s.startsWith('não')) return {cls:'sub-nao', txt:'❌ Sem equivalente'};
  return {cls:'sub-vazio', txt:'—'};
}

function renderRadar() {
  const q = (document.getElementById('radar-input').value||'').toLowerCase().trim();
  let res = RADAR_DB;
  if(filtroMacro) res = res.filter(r => r.macro===filtroMacro);
  if(filtroSub) {
    res = res.filter(r => {
      const s = (r.sub||'').toLowerCase();
      if(filtroSub==='sim') return s.startsWith('sim') && !s.includes('ressalva');
      if(filtroSub==='ressalva') return s.includes('ressalva');
      if(filtroSub==='nao') return s.startsWith('não');
      return true;
    });
  }
  if(q.length>=2) res = res.filter(r =>
    r.c.toLowerCase().includes(q) || r.lc.toLowerCase().includes(q) ||
    r.ativo.toLowerCase().includes(q) || r.cat.toLowerCase().includes(q) ||
    r.candidatos.some(c => c.nome.toLowerCase().includes(q) || c.lab.toLowerCase().includes(q))
  );

  document.getElementById('radar-contador').textContent =
    res.length + ' produto'+(res.length!==1?'s':'')+' encontrado'+(res.length!==1?'s':'');

  const lista = document.getElementById('radar-lista');
  if(!res.length) { lista.innerHTML='<div class="vazio">🔍 Nenhum produto encontrado.<br>Tente o princípio ativo ou laboratório.</div>'; return; }

  lista.innerHTML = res.slice(0,80).map(r => {
    const badge = badgeSub(r.sub);
    const temCand = r.candidatos && r.candidatos.length>0;
    const candsHtml = temCand ? r.candidatos.map((c,i) => `
      <div class="cand ${i===0?'cand-p1':'cand-p2'}">
        <div class="cand-tag" style="color:${i===0?'#CC0000':'#6b7280'}">${i===0?'🏆 Recomendado':'Alternativa '+i}</div>
        <div class="cand-nome">${c.nome}</div>
        <div class="cand-lab">${c.lab}</div>
        <div class="cand-nivel">${c.nivel}</div>
        ${c.sku?`<div class="cand-sku">${c.sku}</div>`:''}
      </div>`).join('')
    : '<div class="lacuna">⚠️ Lacuna de portfólio — sem substituto disponível</div>';

    const crossHtml = r.cross&&r.cross.length ? `
      <div class="box-cross">
        <div class="box-cross-title">🔗 Oportunidades de cross-selling</div>
        ${r.cross.map(cs=>`<div class="box-cross-item"><strong>${cs.produtos[0]}${cs.produtos.length>1?' e outros':''}</strong> — ${cs.just}</div>`).join('')}
      </div>` : '';

    return `<div class="radar-card" onclick="toggleCard(this)">
      <div class="card-topo">
        <div class="card-nomes">
          <div class="card-concorrente">${r.c}</div>
          <div class="card-lab">${r.lc}${r.cat?' · '+r.cat:''}${r.esp?' · '+r.esp:''}</div>
        </div>
        <span class="badge-sub ${badge.cls}">${badge.txt}</span>
      </div>
      <div class="card-detalhe">
        ${r.ativo?`<div class="row"><div class="row-label">Princípio ativo</div><div class="row-val">${r.ativo}${r.fmt?' · <em>'+r.fmt+'</em>':''}</div></div>`:''}
        <div class="row"><div class="row-label">Produto VetVida</div><div class="candidatos">${candsHtml}</div></div>
        ${r.com?`<div class="box-com"><div class="row-label" style="color:#0284c7;">💬 Argumento comercial</div><div class="box-com-val">${r.com}</div></div>`:''}
        ${r.alerta?`<div class="box-alert"><div class="row-label" style="color:#b45309;">⚠️ Atenção</div><div class="box-alert-val">${r.alerta}</div></div>`:''}
        ${crossHtml}
      </div>
    </div>`;
  }).join('') + (res.length>80?'<div class="vazio" style="padding:16px;">Refine a busca para ver mais.</div>':'');
}

function toggleCard(card) {
  const det = card.querySelector('.card-detalhe');
  const aberto = det.classList.contains('aberto');
  document.querySelectorAll('.card-detalhe.aberto').forEach(d => d.classList.remove('aberto'));
  if(!aberto) det.classList.add('aberto');
}

function renderCross() {
  const q = (document.getElementById('cross-input').value||'').toLowerCase().trim();
  let res = CROSS_DB;
  if(q.length>=2) res = res.filter(r =>
    r.gatilho.toLowerCase().includes(q) || r.cat.toLowerCase().includes(q) ||
    r.produtos.some(p => p.toLowerCase().includes(q)) || r.just.toLowerCase().includes(q)
  );

  document.getElementById('cross-contador').textContent =
    res.length + ' regra'+(res.length!==1?'s':'')+' encontrada'+(res.length!==1?'s':'');

  const lista = document.getElementById('cross-lista');
  if(!res.length) { lista.innerHTML='<div class="vazio">🔗 Nenhuma regra encontrada.</div>'; return; }

  lista.innerHTML = res.map(r => `
    <div class="cross-card">
      <div class="cross-card-inner">
        <div class="cross-gatilho">Quando vê: ${r.gatilho}</div>
        <div class="cross-esp">${r.esp}${r.cat?' · '+r.cat:''}</div>
        <span class="${r.prio==='Alta'?'prio-alta':'prio-media'}">${r.prio==='Alta'?'⭐ Alta prioridade':'◎ Média prioridade'}</span>
        <div class="cross-prods">${r.produtos.map(p=>`<span class="cross-prod">${p}</span>`).join('')}</div>
        <div class="cross-just">${r.just}</div>
        ${r.cuidados?`<div class="cross-cuidado">⚠️ ${r.cuidados}</div>`:''}
      </div>
    </div>`).join('');
}

// Init
renderMacroChips();
renderRadar();
</script>
</body>
</html>
