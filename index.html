<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VetVida — Painel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:white;border-radius:16px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.logo-wrap{text-align:center;margin-bottom:28px;}
.logo-wrap img{height:56px;}
.logo-wrap h1{font-size:20px;font-weight:700;color:#1f2937;margin-top:10px;}
.logo-wrap p{font-size:13px;color:#6b7280;margin-top:4px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.4px;}
.form-group input{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;padding:11px 13px;font-size:14px;outline:none;transition:border-color 0.15s;color:#1f2937;background:white;}
.form-group input:focus{border-color:#CC0000;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:40px;}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;padding:4px;}
.btn-login{width:100%;background:#CC0000;color:white;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background 0.15s;}
.btn-login:hover{background:#a80000;}
.btn-login:active{background:#8b0000;}
.erro{color:#CC0000;font-size:13px;text-align:center;margin-top:10px;display:none;}
.rodape{text-align:center;font-size:11px;color:#d1d5db;margin-top:24px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="https://vetvida-promotora.vercel.app/logo.png" onerror="this.style.display='none'" alt="VetVida">
    <h1>VetVida Painel</h1>
    <p>Entre com seu usuário e senha</p>
  </div>

  <div class="form-group">
    <label>Usuário</label>
    <input type="text" id="login-user" placeholder="ex: paula" autocomplete="username"
      onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">
  </div>

  <div class="form-group">
    <label>Senha</label>
    <div class="pw-wrap">
      <input type="password" id="login-pass" placeholder="••••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')fazerLogin()">
      <button class="pw-toggle" onclick="toggleSenha()" tabindex="-1" type="button" aria-label="Mostrar senha">
        <svg id="eye-i" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <button class="btn-login" onclick="fazerLogin()">Entrar</button>
  <div class="erro" id="erro">Usuário ou senha incorretos.</div>

  <div class="rodape">VetVida &copy; 2026</div>
</div>

<script>
// ── CREDENCIAIS CENTRALIZADAS ──────────────────────────────
const USUARIOS = {
  // Gestor
  'felipe':   { senha: 'gestorvv2026',   perfil: 'gestor'  },

  // Promotora
  'nicolle':  { senha: 'nicollevv2026',  perfil: 'nicolle' },

  // Representantes
  'paula':    { senha: 'vvpaula2026',    perfil: 'rep', rep: 'PAULA'   },
  'mauro':    { senha: 'vvmauro2026',    perfil: 'rep', rep: 'MAURO'   },
  'suane':    { senha: 'vvsuane2026',    perfil: 'rep', rep: 'SUANE'   },
  'vanessa':  { senha: 'vvvanessa2026',  perfil: 'rep', rep: 'VANESSA' },
  'luiz':     { senha: 'vvluiz2026',     perfil: 'rep', rep: 'LUIZ'    },
  'paulo':    { senha: 'vvpaulo2026',    perfil: 'rep', rep: 'PAULO'   },
  'nayara':   { senha: 'vvnayara2026',   perfil: 'rep', rep: 'NAYARA'  },
};

// URLs dos sistemas (trocar para domínios próprios após configurar DNS)
const URLS = {
  gestor:  'https://vetvida-reativacao.vercel.app/',
  nicolle: 'https://vetvida-promotora.vercel.app/',
  rep:     'https://vetvida-reativacao.vercel.app/',
};

function fazerLogin() {
  const user = (document.getElementById('login-user').value || '').toLowerCase().trim();
  const pass = document.getElementById('login-pass').value;
  const erro = document.getElementById('erro');

  const match = USUARIOS[user];
  if (!match || match.senha !== pass) {
    erro.style.display = 'block';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }

  erro.style.display = 'none';

  // Salvar sessão via sessionStorage para os sistemas lerem
  sessionStorage.setItem('vv_auth', 'ok');
  sessionStorage.setItem('vv_perfil', match.perfil === 'rep' ? match.rep : match.perfil);
  sessionStorage.setItem('vv_user', user);

  // Redirecionar para o sistema correto
  const url = URLS[match.perfil] || URLS.rep;
  window.location.href = url;
}

function toggleSenha() {
  const input = document.getElementById('login-pass');
  const icon  = document.getElementById('eye-i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// Focar no campo usuário ao carregar
window.addEventListener('load', function() {
  document.getElementById('login-user').focus();
});
</script>
</body>
</html>
