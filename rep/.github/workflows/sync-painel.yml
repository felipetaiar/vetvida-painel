name: Sync para vetvida-painel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar requests
        run: pip install requests

      - name: Baixar script de sync
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          curl -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3.raw" \
               -o sync.py \
               "https://api.github.com/repos/felipetaiar/vetvida-painel/contents/sync.py"

      - name: Executar sync
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          PASTA: rep
          REPO_SRC: felipetaiar/vetvida-reativacao
          EXCLUIR: gerar_painel.py,package.json,vercel.json,api/sheets.js
        run: python3 sync.py
